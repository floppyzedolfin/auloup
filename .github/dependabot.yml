version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # core-ktx 1.19+ requires compileSdk 37; we stay on 36 for now. Drop this
      # entry when the project moves its compileSdk to 37.
      - dependency-name: "androidx.core:core-ktx"
        versions: [">=1.19.0"]
    groups:
      # Bundle routine minor/patch bumps into a single PR. Major bumps stay
      # separate so breaking upgrades (e.g. AGP) get their own focused review.
      gradle-minor-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch
