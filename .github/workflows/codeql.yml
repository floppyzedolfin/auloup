name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan (Mondays 03:27 UTC) to catch newly-published advisories.
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # build-mode: none extracts straight from source, so CodeQL doesn't build
      # (or instrument) the Kotlin compiler. That keeps scanning decoupled from
      # the Kotlin/AGP toolchain version, which otherwise breaks when Kotlin
      # outpaces CodeQL's bundled extractor.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
